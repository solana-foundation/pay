name: gemini
subdomain: gemini
title: "Gemini AI (Session)"
description: >
  Generate content with Gemini models using a pre-funded Solana session channel.
  Open one channel per session and pay for Gemini usage with signed cumulative
  vouchers — no on-chain transaction per call.
category: ai_ml
version: v1beta
routing:
  type: proxy
  url: https://generativelanguage.googleapis.com/
  auth:
    method: query_param
    key: "key"
    value_from_env: GOOGLE_API_KEY
operator:
  currencies:
    usd: ["USDC", "USDT", "CASH"]
  network: "localnet"
  fee_payer: true

recipients:
  platform:
    account: "DZwGzbZaqqaBsUPLJTvGqhhQjoi6PcTQ42HnZLYm4ici"
    label: "Platform Fee"

# Session channel parameters.
# The middleware issues a 402 with intent="session" instead of intent="charge".
# Clients send signed vouchers on each call; no on-chain tx per request.
session:
  # Default channel cap offered to clients (USDC, human-readable).
  # Clients may request a lower cap; the server will not accept higher.
  cap_usdc: 10.0
  # Minimum voucher increment (base units = µUSDC).
  # Official Gemini token prices can be sub-µUSDC per token. We settle in
  # 0.000001 USDC quanta (1 µUSDC) once usage has accumulated enough value.
  min_voucher_delta: 1
  # Idle delay before the operator closes and settles the channel.
  close_delay_ms: 15000
  # Pull follows charge semantics at the payment boundary: the operator opens
  # and funds the payment-channel, then the client signs cumulative vouchers.
  modes: [pull]
  pull_voucher_strategy: client_voucher
  splits:
    - recipient: platform
      percent: 0.1
      memo: "Platform fee"

endpoints:
  # ── Free ──────────────────────────────────────────────────────────────────

  - method: GET
    path: "v1beta/models"
    resource: "models"
    description: "List available Gemini models. Free — no payment required."

  - method: GET
    path: "v1beta/models/{modelsId}"
    resource: "models"
    description: "Get model metadata. Free — no payment required."

  # ── Metered (Gemini pricing quantized to 0.000001 USDC) ───────────────────

  - method: POST
    path: "v1beta/models/{modelsId}:generateContent"
    resource: "models"
    description: >
      Generate content with a Gemini model. Requires session vouchers metered
      against official Gemini API paid-tier standard pricing, quantized to
      0.000001 USDC settlement increments where sub-µUSDC token prices require
      batching.
    metering:
      variants: &official_gemini_generation_metering
        - param: model
          value: gemini-3.1-pro-preview
          dimensions:
            - direction: input
              unit: tokens
              scale: 1
              tiers:
                - price_usd: 0.000002
                  condition: { field: context_length, op: "<=", value: 200000 }
                  notes: "Official Gemini 3.1 Pro Preview input, $2.00 / 1M tokens, prompts <= 200k"
                - price_usd: 0.000004
                  condition: { field: context_length, op: ">", value: 200000 }
                  notes: "Official Gemini 3.1 Pro Preview input, $4.00 / 1M tokens, prompts > 200k"
            - direction: output
              unit: tokens
              scale: 1
              tiers:
                - price_usd: 0.000012
                  condition: { field: context_length, op: "<=", value: 200000 }
                  notes: "Official Gemini 3.1 Pro Preview output, $12.00 / 1M tokens, prompts <= 200k"
                - price_usd: 0.000018
                  condition: { field: context_length, op: ">", value: 200000 }
                  notes: "Official Gemini 3.1 Pro Preview output, $18.00 / 1M tokens, prompts > 200k"
        - param: model
          value: gemini-3.1-flash-lite
          dimensions:
            - direction: input
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000001
                  notes: "4 input tokens per quota unit; official Gemini 3.1 Flash-Lite input is $0.25 / 1M tokens"
            - direction: output
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000003
                  notes: "2 output tokens per quota unit; official Gemini 3.1 Flash-Lite output is $1.50 / 1M tokens, including thinking tokens"
        - param: model
          value: gemini-2.5-pro
          dimensions:
            - direction: input
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000005
                  condition: { field: context_length, op: "<=", value: 200000 }
                  notes: "4 input tokens per quota unit; official Gemini 2.5 Pro input is $1.25 / 1M tokens, prompts <= 200k"
                - price_usd: 0.000005
                  condition: { field: context_length, op: ">", value: 200000 }
                  notes: "2 input tokens per quota unit; official Gemini 2.5 Pro input is $2.50 / 1M tokens, prompts > 200k"
            - direction: output
              unit: tokens
              scale: 1
              tiers:
                - price_usd: 0.00001
                  condition: { field: context_length, op: "<=", value: 200000 }
                  notes: "Official Gemini 2.5 Pro output, $10.00 / 1M tokens, prompts <= 200k"
                - price_usd: 0.000015
                  condition: { field: context_length, op: ">", value: 200000 }
                  notes: "Official Gemini 2.5 Pro output, $15.00 / 1M tokens, prompts > 200k"
        - param: model
          value: gemini-2.5-flash-lite
          dimensions:
            - direction: input
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000001
                  notes: "10 input tokens per quota unit; official Gemini 2.5 Flash-Lite input is $0.10 / 1M tokens"
            - direction: output
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000002
                  notes: "5 output tokens per quota unit; official Gemini 2.5 Flash-Lite output is $0.40 / 1M tokens"
        - param: model
          value: gemini-2.5-flash
          dimensions:
            - direction: input
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000003
                  notes: "10 input tokens per quota unit; official Gemini 2.5 Flash input is $0.30 / 1M tokens"
            - direction: output
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000005
                  notes: "2 output tokens per quota unit; official Gemini 2.5 Flash output is $2.50 / 1M tokens, including thinking tokens"
        - param: model
          value: gemini-2.0-flash-lite
          dimensions:
            - direction: input
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000003
                  notes: "40 input tokens per quota unit; official Gemini 2.0 Flash-Lite input is $0.075 / 1M tokens; model deprecated June 1, 2026"
            - direction: output
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000003
                  notes: "10 output tokens per quota unit; official Gemini 2.0 Flash-Lite output is $0.30 / 1M tokens; model deprecated June 1, 2026"
        - param: model
          value: gemini-2.0-flash
          dimensions:
            - direction: input
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000001
                  notes: "10 input tokens per quota unit; official Gemini 2.0 Flash input is $0.10 / 1M tokens; model deprecated June 1, 2026"
            - direction: output
              unit: quota_units
              scale: 1
              tiers:
                - price_usd: 0.000002
                  notes: "5 output tokens per quota unit; official Gemini 2.0 Flash output is $0.40 / 1M tokens; model deprecated June 1, 2026"

  - method: POST
    path: "v1beta/models/{modelsId}:streamGenerateContent"
    resource: "models"
    description: >
      Stream generated content with a Gemini model. Requires session vouchers
      metered against official Gemini API paid-tier standard pricing, quantized
      to 0.000001 USDC settlement increments where sub-µUSDC token prices
      require batching.
    metering:
      variants: *official_gemini_generation_metering

  - method: POST
    path: "v1beta/models/{modelsId}:countTokens"
    resource: "models"
    description: "Count tokens in a prompt. Flat fee."
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.0001  # 0.0001 USDC per count call

  - method: POST
    path: "v1beta/models/{modelsId}:embedContent"
    resource: "models"
    description: "Generate text embeddings. Flat fee per call."
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.0001
