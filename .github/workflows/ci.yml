name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  pull-requests: write

jobs:
  # ── TypeScript SDK ──
  core-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: pnpm install
      - run: pnpm --filter @solana/pay test

  # ── Rust lint ──
  rust-check:
    name: Rust lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Rust tests + coverage ──
  rust-test:
    name: Rust tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --features server --json --output-path coverage.json
      - name: Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: rust/coverage.json
      - name: Build coverage comment
        if: github.event_name == 'pull_request'
        id: cov
        run: |
          RS_LINES=$(jq -r '[.data[0].totals.lines.percent] | .[0] | . * 10 | round / 10' coverage.json)
          RS_FUNC=$(jq -r '[.data[0].totals.functions.percent] | .[0] | . * 10 | round / 10' coverage.json)
          RS_REGIONS=$(jq -r '[.data[0].totals.regions.percent] | .[0] | . * 10 | round / 10' coverage.json)

          badge() {
            local val=$1
            if [ "$(echo "$val >= 90" | bc -l)" = "1" ]; then echo "🟢"
            elif [ "$(echo "$val >= 80" | bc -l)" = "1" ]; then echo "🟡"
            else echo "🔴"; fi
          }
          BADGE=$(badge "$RS_LINES")

          {
            echo "body<<EOF"
            echo "## Test Coverage"
            echo ""
            echo "| | Regions | Functions | Lines |"
            echo "|---|---|---|---|"
            echo "| ${BADGE} **Rust** | ${RS_REGIONS}% | ${RS_FUNC}% | ${RS_LINES}% |"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: ${{ steps.cov.outputs.body }}
