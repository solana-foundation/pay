name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  pull-requests: write

jobs:
  # ── TypeScript SDK ──
  core-test:
    name: TypeScript tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: pnpm install
      - run: cd packages/solana-pay/core && npx vitest run --coverage
      - name: Upload TS coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: typescript/packages/solana-pay/core/coverage/coverage-summary.json
          if-no-files-found: ignore

  # ── Rust lint ──
  rust-check:
    name: Rust lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build PDB frontend
        run: cd ../web-ui && pnpm install --frozen-lockfile && pnpm build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Compile opt-in network coverage without making a public-network request.
  rust-network-test-feature-compile:
    name: Rust network_tests feature compile (no run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Compile the OpenAPI smoke behind network_tests
        run: >-
          cargo test -p pay-core --test openapi_resolve_smoke
          --features network_tests --no-run

  # Compile each OS-specific native path without expanding PR CI to the full workspace.
  rust-native-platform-compile:
    name: Rust native paths (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: ./rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Compile CLI native paths
        run: cargo check -p pay --all-targets
      - name: Test native keystore paths
        run: cargo test -p pay-keystore

  native-release-artifact-contract:
    name: Native release artifact contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Check npm declarations match the release matrix
        run: node scripts/check-native-release-artifacts.mjs

  # ── Rust tests + coverage ──
  rust-test:
    name: Rust tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build PDB frontend
        run: cd ../web-ui && pnpm install --frozen-lockfile && pnpm build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Run tests with coverage
        env:
          SURFPOOL_REPORT: "1"
        run: cargo llvm-cov --workspace --features server --exclude pay --ignore-filename-regex 'crates/cli/' --json --output-path coverage.json
      - name: Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: rust/coverage.json
      - name: Upload Rust surfpool report data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surfpool-reports-rust
          path: rust/target/surfpool-reports/
          if-no-files-found: ignore
