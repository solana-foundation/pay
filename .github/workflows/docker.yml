name: Publish pay to GHCR

on:
  push:
    tags: ["pay-v*"]
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR"
        required: true
        default: false
        type: boolean

env:
  IMAGE: ghcr.io/solana-foundation/pay

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=^pay-v(.*)$,group=1
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/pay-v') }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./rust
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
