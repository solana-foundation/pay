name: Publish pay to GHCR

on:
  push:
    tags: ["pay-v*"]
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR"
        required: true
        default: false
        type: boolean

env:
  IMAGE: ghcr.io/solana-foundation/pay

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Fetch Doppler secrets
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_SERVICE_IDENTITY_ID }}
          doppler-project: ${{ vars.DOPPLER_PROJECT || 'pay' }}
          doppler-config: ${{ vars.DOPPLER_CONFIG_CI || 'prd' }}
          inject-env-vars: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./rust
          build-args: |
            PAY_MOONPAY_PUBLISHABLE_API_KEY=${{ steps.doppler.outputs.PAY_MOONPAY_PUBLISHABLE_API_KEY }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
