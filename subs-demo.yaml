name: pro-feed
subdomain: pro-feed
title: "Pro Feed"
description: "Flat-fee monthly access — $9.99 USDC every 30 days."
category: data
version: v1

routing:
  type: respond

operator:
  currencies:
    usd: ["USDC", "USDT", "CASH"]
  network: localnet
  fee_payer: true
  # Required for subscription endpoints. Signs the SIWMPP session tokens callers
  # present on activation/renewal. Must stay stable across restarts — rotating
  # it invalidates every outstanding session token. Generate with:
  #   openssl rand -hex 32
  challenge_binding_secret: "9e7a8d130353de86cd6f9c20132ded74e6d6dfd3178d536e1ec62b5cee2254fd"

endpoints:
  - method: GET
    path: "api/v1/pro/feed"
    resource: "pro-feed"
    description: "Pro feed — monthly subscription, 30-day billing period."
    subscription:
      # Periods are fixed elapsed time. Use `d`/`day`/`days` or `w`/`week`/`weeks`.
      # `month` is rejected (calendar months are not a fixed number of hours).
      period: "30d"
      price_usd: 9.99
      currency: USDC
      # plan_id is written back here by `pay --sandbox server start` on first
      # launch, after you approve publishing the on-chain Plan PDA. Commit it.
      plan_id: 9HMnchSEyuLVg6fq5WhU4fe1VzHYDR2h8mWL6hQEqJUM
      plan_id_numeric: 24
      plan_bump: 255
      plan_created_at: 1782489692
