apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paid-api
  annotations:
    konghq.com/plugins: solana-kong-402
spec:
  parentRefs:
    - name: kong
  hostnames:
    - paid.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /paid
      backendRefs:
        - name: paid-api
          port: 80
